[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[dev]
  command = "npm run dev:vite"
  port = 8888
  targetPort = 5173
  framework = "#custom"

[[redirects]]
  from = "/api/command"
  to = "/.netlify/functions/command"
  status = 200

[[redirects]]
  from = "/api/form/*"
  to = "/.netlify/functions/form-submit/:splat"
  status = 200

[[redirects]]
  from = "/api/webhook/*"
  to = "/.netlify/functions/webhook-receive/:splat"
  status = 200

[[redirects]]
  from = "/p/*"
  to = "/.netlify/functions/page-serve/:splat"
  status = 200

[[redirects]]
  from = "/t/*"
  to = "/.netlify/functions/track-click/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[functions]
  node_bundler = "esbuild"
